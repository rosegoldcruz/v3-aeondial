; =============================================================
; AEON Dial v3 — Dialplan Extensions
; Mirrored from /etc/asterisk/extensions.conf
; =============================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

; ---------- Internal context (agent + stub) ----------
[aeon-internal]
; Stasis application — all outbound calls enter this app for ARI control
exten => _X.,1,NoOp(AEON Dial outbound to ${EXTEN})
 same => n,Answer()
 same => n,Stasis(aeon-dialer,outbound,${EXTEN})
 same => n,Hangup()

; Local stub for testing — auto-answer (no SIP registration needed)
exten => 9999,1,NoOp(Stub endpoint - auto answer for testing)
 same => n,Answer()
 same => n,Playback(tt-monkeys)
 same => n,Wait(30)
 same => n,Hangup()

; Agent internal extension
exten => 1001,1,NoOp(Agent extension ring)
 same => n,Stasis(aeon-dialer,agent-ring,1001)
 same => n,Hangup()

; ---------- Local test context (for origination testing) ----------
[aeon-test]
exten => 9999,1,NoOp(Test stub - auto answer)
 same => n,Answer()
 same => n,Stasis(aeon-dialer,test,9999)
 same => n,Hangup()

exten => _X.,1,NoOp(Test generic)
 same => n,Answer()
 same => n,Stasis(aeon-dialer,test,${EXTEN})
 same => n,Hangup()

; ---------- Inbound context (from trunk) ----------
[aeon-inbound]
exten => _X.,1,NoOp(AEON Dial inbound from ${CALLERID(num)})
 same => n,Answer()
 same => n,Stasis(aeon-dialer,inbound,${EXTEN})
 same => n,Hangup()
