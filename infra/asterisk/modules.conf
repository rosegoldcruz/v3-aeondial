; =============================================================
; AEON Dial v3 — Module loading
; Mirrored from /etc/asterisk/modules.conf
; =============================================================

[modules]
autoload=yes

; Ensure PJSIP + ARI are loaded
load = res_pjsip.so
load = res_pjsip_transport_websocket.so
load = res_ari.so
load = res_ari_channels.so
load = res_ari_bridges.so
load = res_ari_recordings.so
load = res_ari_playbacks.so
load = res_stasis.so
load = res_http_websocket.so

; Disable chan_sip (legacy) to avoid port conflict
noload = chan_sip.so
