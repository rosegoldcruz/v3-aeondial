; =============================================================
; AEON Dial v3 — PJSIP Configuration
; Mirrored from /etc/asterisk/pjsip.conf
; =============================================================

; ---------- Transport ----------
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ---------- Agent (softphone/webrtc) endpoint ----------
; This is the internal agent extension that the dialer bridges to.
; The agent's SIP client registers as 'agent01' with password from env.
[agent01]
type=endpoint
context=aeon-internal
disallow=all
allow=ulaw
allow=alaw
auth=agent01-auth
aors=agent01-aors
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[agent01-auth]
type=auth
auth_type=userpass
username=agent01
password=aeon_agent_secret_changeme

[agent01-aors]
type=aor
max_contacts=1
remove_existing=yes

; ---------- Local stub endpoint for testing ----------
; Registers itself automatically; used to verify the originate flow
; without a real PSTN trunk.
[stub-local]
type=endpoint
context=aeon-internal
disallow=all
allow=ulaw
allow=alaw
auth=stub-local-auth
aors=stub-local-aors
direct_media=no

[stub-local-auth]
type=auth
auth_type=userpass
username=stub-local
password=stub_secret_changeme

[stub-local-aors]
type=aor
max_contacts=1
remove_existing=yes

; ---------- SIP Trunk (outbound to PSTN) ----------
; PLACEHOLDER: Fill in once provider (Telnyx/Twilio/Bandwidth) is selected.
; Uncomment and configure with real credentials from .env.local:
;   SIP_PROVIDER_HOST, SIP_USERNAME, SIP_PASSWORD, SIP_OUTBOUND_DID
;
; [trunk-provider]
; type=endpoint
; context=aeon-inbound
; disallow=all
; allow=ulaw
; allow=alaw
; outbound_auth=trunk-provider-auth
; aors=trunk-provider-aors
; direct_media=no
; from_domain=${SIP_PROVIDER_HOST}
; from_user=${SIP_USERNAME}
;
; [trunk-provider-auth]
; type=auth
; auth_type=userpass
; username=${SIP_USERNAME}
; password=${SIP_PASSWORD}
;
; [trunk-provider-aors]
; type=aor
; contact=sip:${SIP_PROVIDER_HOST}
; qualify_frequency=60
;
; [trunk-provider-identify]
; type=identify
; endpoint=trunk-provider
; match=${SIP_PROVIDER_HOST}
